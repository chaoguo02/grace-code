llm:
  provider: ${FORGE_LLM_PROVIDER}
  model: ${FORGE_LLM_MODEL}
  api_key: ${DEEPSEEK_API_KEY}
  base_url: ${FORGE_LLM_BASE_URL}
  max_tokens: 8192

agent:
  max_steps: 40
  budget_tokens: 80000
  log_dir: ./logs

tools:
  shell:
    timeout: 30 # 秒
    max_output_tokens: 8000 # 截断长度
  file:
    max_view_lines: 100 # view 命令每次显示行数
  web:
    search_max_results: 10 # 每次搜索最多返回条数
    fetch_max_chars: 100000 # 抓取最大字符数（~100KB）
    fetch_timeout: 15 # 抓取超时秒数

memory:
  enabled: true # 是否启用长期记忆
  directory: "" # 记忆目录，空=默认 ~/.forge-agent/projects/<hash>/memory/
  max_index_lines: 50 # MEMORY.md 每次注入上下文的最大行数
  auto_memory: true # 是否允许 agent 自主写入记忆

plan:
  enable_replan: false # DAG 失败后是否自动重新规划剩余任务
  max_replans: 1 # 单次 DAG 执行最多重新规划次数
  allow_parallel_verification: false # 是否允许 verification 同层并行（默认关闭）
  allow_parallel_commands: false # 是否允许 command 同层并行（默认关闭）

multi_agent:
  worker_model: "" # 子 Agent 使用的模型（空=与 Coordinator 同款）
  worker_provider: "" # 子 Agent 的 provider（空=与 Coordinator 同款）
  max_parallel_executors: 3 # 并行 executor 最大数
  coordinator_budget_ratio: 0.30 # Coordinator 占总预算比例
  sub_agent_budget_ratio: 0.70 # 子 Agent 占总预算比例
  max_retries: 2 # Reviewer 拒绝后最大重试次数
  coordinator_max_steps: 25

hitl:
  enabled: true
  min_risk_for_confirm: medium   # none / low / medium / high
  policy_file: .forge-agent/hitl/policies.yaml
  learn_threshold: 3             # 连续 N 次相同决策后自动学习为 policy

context:
  repo_map_budget: 8000 # repo-map 最大 token 数
  history_window: 20 # 保留最近 N 轮对话

# ---------------------------------------------------------------------------
# MCP Servers — 外部 MCP 工具服务器
# ---------------------------------------------------------------------------
# 每个 server 是一个独立进程，通过 stdio JSON-RPC 通信。
# forge-agent 启动时自动连接每个 server，发现其工具并注册到工具表。
#
# 格式：
# mcp_servers:
#   <server_name>:
#     command: <启动命令>
#     args: [<参数列表>]
#     env:       # 可选，额外环境变量
#       KEY: value
#     cwd: ""    # 可选，工作目录
#
# 示例（内置 web-search MCP server）：
# mcp_servers:
#   web-search:
#     command: python
#     args: ["-m", "mcp_servers.web_search_server"]
#     env:
#       SEARCH_MAX_RESULTS: "10"
#       FETCH_MAX_CHARS: "100000"
#       FETCH_TIMEOUT: "15"
#
# 第三方 MCP server（如 Brave Search）：
#   brave-search:
#     command: npx
#     args: ["-y", "@anthropic/mcp-server-brave-search"]
#     env:
#       BRAVE_API_KEY: "${BRAVE_API_KEY}"
mcp_servers:
  demo:
    command: python
    args: ["-m", "mcp_servers.demo_server"]